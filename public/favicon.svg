<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Black background -->
  <rect width="64" height="64" fill="#000000"/>
  <!-- Tower base / body -->
  <rect x="22" y="34" width="20" height="22" fill="#ffffff"/>
  <!-- Doorway arch -->
  <path d="M28 56 L28 48 Q32 43 36 48 L36 56 Z" fill="#000000"/>
  <!-- Tower mid section -->
  <rect x="24" y="24" width="16" height="12" fill="#ffffff"/>
  <!-- Window left -->
  <rect x="26" y="27" width="4" height="6" rx="2" fill="#000000"/>
  <!-- Window right -->
  <rect x="34" y="27" width="4" height="6" rx="2" fill="#000000"/>
  <!-- Battlements -->
  <rect x="22" y="20" width="4" height="6" fill="#ffffff"/>
  <rect x="28" y="20" width="4" height="6" fill="#ffffff"/>
  <rect x="34" y="20" width="4" height="6" fill="#ffffff"/>
  <rect x="40" y="20" width="4" height="6" fill="#ffffff"/>
  <!-- Spire base -->
  <rect x="28" y="10" width="8" height="12" fill="#ffffff"/>
  <!-- Spire tip -->
  <polygon points="32,2 28,10 36,10" fill="#ffffff"/>
  <!-- Spire cross -->
  <rect x="31" y="4" width="2" height="8" fill="#000000"/>
  <rect x="28" y="7" width="8" height="2" fill="#000000"/>
</svg>
